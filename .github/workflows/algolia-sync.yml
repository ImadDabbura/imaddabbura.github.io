name: Sync Algolia index
on:
  push:
    branches: [main]
    paths: ['docs/search.json']
  workflow_dispatch:
permissions:
  contents: read
jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r scripts/requirements.txt
      - run: python scripts/sync_algolia.py --dry-run   # validate before touching the index
      - run: python scripts/sync_algolia.py
        env:
          ALGOLIA_ADMIN_KEY: ${{ secrets.ALGOLIA_ADMIN_KEY }}
